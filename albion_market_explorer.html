<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albion Market Explorer</title>
<style>
  :root {
    --bg: #0f1115; --surface: #171a21; --surface-2: #1f232c; --border: #2a2f3a;
    --text: #e8e9ec; --text-secondary: #9aa0ab; --accent: #4f8cff; --success: #3ecf8e; --danger: #e2534a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.5; font-size: 16px; }
  select, button, input { font-family: inherit; font-size: 15px; }
  select, input[type=text] { width: 100%; padding: 10px 12px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); color: var(--text); }

  /* Top bar */
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 12px 20px; border-bottom: 0.5px solid var(--border); background: var(--surface); flex-wrap: wrap; }
  .topbar-left { display: flex; align-items: center; gap: 24px; }
  .logo { font-weight: 700; font-size: 18px; white-space: nowrap; }
  .tabs { display: flex; gap: 4px; }
  .tab-btn { padding: 8px 16px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary);
    cursor: pointer; font-weight: 500; font-size: 15px; }
  .tab-btn.active { background: var(--surface-2); color: var(--text); }
  .topbar-right { display: flex; gap: 8px; }
  .topbar-right select { width: auto; min-width: 110px; }

  /* Layout */
  .layout { display: grid; grid-template-columns: 260px 1fr; gap: 0; align-items: start; }
  .sidebar { padding: 14px 16px; border-right: 0.5px solid var(--border); position: sticky; top: 0; height: calc(100vh - 57px); overflow-y: hidden; display: flex; flex-direction: column; }
  .main { padding: 20px; min-width: 0; }
  .field { margin-bottom: 8px; flex-shrink: 0; }
  .field.grow { flex: 1; min-height: 70px; display: flex; flex-direction: column; margin-bottom: 8px; }
  .field label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.02em; }
  .checkbox-row { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text); padding: 2px 0; }
  .checkbox-row input { width: auto; }
  .check-box-group { border: 0.5px solid var(--border); border-radius: 8px; padding: 5px 10px; background: var(--surface); overflow-y: auto; flex: 1; min-height: 0; }
  .divider { border-top: 0.5px solid var(--border); margin: 3px 0 5px; }
  button.go { width: 100%; padding: 10px; border-radius: 8px; border: 0.5px solid var(--accent); background: var(--accent);
    color: #fff; cursor: pointer; font-weight: 600; margin-top: auto; font-size: 14px; }
  button.go:disabled { opacity: 0.6; cursor: default; }
  select, input[type=text] { padding: 7px 10px; }

  .status { font-size: 14px; color: var(--text-secondary); margin: 0 0 16px; min-height: 18px; }
  table { width: 100%; border-collapse: collapse; font-size: 15px; }
  th, td { padding: 12px 10px; text-align: left; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  th { color: var(--text-secondary); font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.02em; }
  td.num, th.num { text-align: right; }
  td.icon-cell { width: 56px; }
  td.icon-cell img { width: 44px; height: 44px; border-radius: 6px; background: var(--surface-2); display: block; }
  .profit { color: var(--success); font-weight: 600; }
  .table-wrap { overflow-x: auto; }
  .note { font-size: 12px; color: var(--text-secondary); margin-top: 24px; border-top: 0.5px solid var(--border); padding-top: 16px; }

  /* Item search */
  .search-box { position: relative; max-width: 480px; margin-bottom: 20px; }
  .search-results-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface);
    border: 0.5px solid var(--border); border-radius: 8px; margin-top: 4px; max-height: 340px; overflow-y: auto; z-index: 10; }
  .search-result-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; font-size: 15px; }
  .search-result-item:hover { background: var(--surface-2); }
  .search-result-item img { width: 32px; height: 32px; border-radius: 4px; background: var(--surface-2); }
  .selected-item-header { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; margin-bottom: 24px; }
  .selected-item-header img { width: 140px; height: 140px; border-radius: 12px; background: var(--surface-2); }
  .selected-item-header h2 { font-size: 22px; margin: 0; }
  .period-buttons { display: flex; gap: 6px; margin: 20px 0 12px; }
  .period-btn { padding: 7px 14px; border-radius: 20px; border: 0.5px solid var(--border); background: var(--surface);
    color: var(--text-secondary); cursor: pointer; font-size: 13px; }
  .period-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .section-title { font-size: 14px; font-weight: 600; margin: 24px 0 8px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.02em; }

  .craft-picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(84px, 1fr)); gap: 8px; margin-bottom: 24px; }
  .craft-pick { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px; border-radius: 10px;
    border: 0.5px solid var(--border); background: var(--surface); cursor: pointer; text-align: center; }
  .craft-pick:hover { background: var(--surface-2); }
  .craft-pick.active { border-color: var(--accent); background: var(--surface-2); }
  .craft-pick img { width: 40px; height: 40px; border-radius: 6px; background: var(--surface-2); }
  .craft-pick span { font-size: 11px; color: var(--text-secondary); line-height: 1.2; }
  .craft-tier-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .craft-tier-row select { width: auto; min-width: 90px; }
  .craft-card { border: 0.5px solid var(--border); border-radius: 12px; padding: 20px; background: var(--surface); }
  .craft-card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .craft-card-header img { width: 56px; height: 56px; border-radius: 8px; background: var(--surface-2); }
  .craft-card-header h3 { margin: 0 0 4px; font-size: 18px; }
  .craft-card-header .sub { font-size: 13px; color: var(--text-secondary); }
  .craft-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-top: 16px; }
  .craft-stat { background: var(--surface-2); border-radius: 8px; padding: 12px; }
  .craft-stat .label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.02em; margin-bottom: 4px; }
  .craft-stat .value { font-size: 17px; font-weight: 600; }
  .craft-resource-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 14px; }
  .craft-resource-row img { width: 28px; height: 28px; border-radius: 4px; background: var(--surface-2); }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; border-right: none; border-bottom: 0.5px solid var(--border); height: auto; overflow-y: visible; }
  }
</style>
</head>

  <div class="topbar-left">
    <div class="logo">Albion Market Explorer</div>
    <div class="tabs">
      <button class="tab-btn active" id="tabExplorer">Market Explorer</button>

      <button class="tab-btn" id="tabCraft">Craft</button>

  </div>
  <div class="topbar-right">
    <select id="idioma">
      <option value="en" selected>English</option>

    </select>
    <select id="regiao">
      <option value="west" selected>Americas</option>

    </div>

    <div class="field grow">

    </div>

        <option value="pct">...</option>

    </div>
    <button class="go" id="goBtn">Search</button>
  </div>

    <p class="status" id="status">Connecting to backend...</p>
    <div id="results"></div>
    <p class="note" id="nota"></p>
  </div>
</div>

<!-- ===== Item Search view ===== -->
<div class="main" id="viewSearch" style="display:none; max-width: 900px; margin: 0 auto;">

    <div class="search-results-dropdown" id="searchDropdown" style="display:none;"></div>

  <div id="searchResultArea"></div>
</div>

<!-- ===== Craft view ===== -->
<div class="main" id="viewCraft" style="display:none; max-width: 980px; margin: 0 auto;">

  <div id="craftCityArea"></div>

function textOf(v) { return typeof v === 'string' ? v : v[lang]; }

async function loadCraftFamilies() {
  try {
    const res = await fetch('/api/craft-families');
    const data = await res.json();
    CRAFT_GROUPS_DATA = data.groups || [];
  } catch (e) { CRAFT_GROUPS_DATA = []; }

function renderCraftBreadcrumb() {
  const el = document.getElementById('craftBreadcrumb');
  if (pickerLevel === 'group') { el.innerHTML = ''; return; }
  const group = CRAFT_GROUPS_DATA.find(function (g) { return g.group === selectedGroup; });
  const groupName = group ? group.label[lang] : '';
  el.innerHTML = '<a href="#" id="breadcrumbBack" style="color:var(--accent); text-decoration:none;">← ' + t('craftAllGroups') + '</a>' +
    (groupName ? ' / ' + groupName : '');
  const back = document.getElementById('breadcrumbBack');
  if (back) back.addEventListener('click', function (e) { e.preventDefault(); pickerLevel = 'group'; selectedGroup = null; document.getElementById('craftResultArea').innerHTML = ''; renderCraftPicker(); });
}

function renderCraftPicker() {
  renderCraftBreadcrumb();
  const grid = document.getElementById('craftPickerGrid');

  if (pickerLevel === 'group') {
    grid.innerHTML = CRAFT_GROUPS_DATA.map(function (g) {
      const rep = g.variants[0];
      const name = g.label[lang];
      return '<div class="craft-pick" data-group="' + g.group + '">' +
        '<img src="' + itemIconUrl('T4_' + rep.family, 1) + '" loading="lazy" onerror="this.style.display=\'none\'" alt="" />' +
        '<span>' + name + '</span></div>';
    }).join('');
    grid.querySelectorAll('.craft-pick').forEach(function (el) {
      el.addEventListener('click', function () {
        selectedGroup = this.dataset.group;
        pickerLevel = 'variant';
        document.getElementById('craftResultArea').innerHTML = '';
        renderCraftPicker();
      });
    });
    return;
  }

  const group = CRAFT_GROUPS_DATA.find(function (g) { return g.group === selectedGroup; });
  if (!group) return;
  grid.innerHTML = group.variants.map(function (v) {
    const name = v[lang];
    return '<div class="craft-pick' + (selectedFamily === v.family ? ' active' : '') + '" data-family="' + v.family + '">' +
      '<img src="' + itemIconUrl('T4_' + v.family, 1) + '" loading="lazy" onerror="this.style.display=\'none\'" alt="" />' +
      '<span>' + name + '</span></div>';
  }).join('');
  grid.querySelectorAll('.craft-pick').forEach(function (el) {
    el.addEventListener('click', function () { pickCraftFamily(this.dataset.family); });
  });
}

function pickCraftFamily(family) {
  selectedFamily = family;
  renderCraftPicker();
  const group = CRAFT_GROUPS_DATA.find(function (g) { return g.group === selectedGroup; });
  const variant = group && group.variants.find(function (v) { return v.family === family; });
  if (!variant) return;

  const area = document.getElementById('craftResultArea');
  const tiers = [];
  for (let tt = variant.tierMin; tt <= variant.tierMax; tt++) tiers.push(tt);
  const defaultTier = tiers.includes(4) ? 4 : tiers[0];

  area.innerHTML = '<div class="craft-tier-row"><label style="color:var(--text-secondary); font-size:13px;">' + t('craftTier') + '</label>' +
    '<select id="craftTierSelect">' + tiers.map(function (tt) { return '<option value="' + tt + '"' + (tt === defaultTier ? ' selected' : '') + '>T' + tt + '</option>'; }).join('') + '</select></div>' +
    '<div id="craftCardArea"><p class="status">' + t('searching') + '</p></div>';

  document.getElementById('craftTierSelect').addEventListener('change', function () {
    loadCraftInfo(family, parseInt(this.value, 10));
  });
  loadCraftInfo(family, defaultTier);
}

async function loadCraftInfo(family, tier) {
  const cardArea = document.getElementById('craftCardArea');
  cardArea.innerHTML = '<p class="status">' + t('searching') + '</p>';
  try {
    const res = await fetch('/api/craft-info?family=' + encodeURIComponent(family) + '&tier=' + tier);
    const data = await res.json();
    if (data.status !== 'ok') { cardArea.innerHTML = '<p class="status">' + t('priceNoData') + '</p>'; return; }

    const name = lang === 'pt' ? data.pt : data.en;
    const resourceRows = data.resources.map(function (r) {
      const rName = lang === 'pt' ? r.pt : r.en;
      return '<div class="craft-resource-row"><img src="' + itemIconUrl(r.id, 1) + '" onerror="this.style.display=\'none\'" alt="" />' +
        '<span>' + r.qty + '× ' + rName + '</span></div>';
    }).join('');

    cardArea.innerHTML = '<div class="craft-card">' +
      '<div class="craft-card-header"><img src="' + itemIconUrl(data.itemId, 1) + '" onerror="this.style.display=\'none\'" alt="" />' +
      '<div><h3>T' + tier + ' ' + name + '</h3><div class="sub">' + t('craftColCity') + ': ' + (data.city || t('noVolume')) + '</div></div></div>' +
      '<div>' + resourceRows + '</div></div>';
  } catch (e) {
    cardArea.innerHTML = '<p class="status">' + t('backendError') + '</p>';
  }
}

  document.getElementById('craftCityTitle').textContent = t('craftCityTitle');

  const cityRows = CITY_BONUSES.map(function (c) {

function t(key, vars) {
  let s = I18N[lang][key] || key;
  if (vars) for (const k in vars) s = s.replace('{' + k + '}', vars[k]);
  return s;
}

function itemIconUrl(id, quality, size) {
  return 'https://render.albiononline.com/v1/item/' + encodeURIComponent(id) + '.png?size=' + (size || 64) + '&quality=' + (quality || 1);
}

function buildSellCityCheckboxes() {
  const box = document.getElementById('sellCitiesBox');
  const buyCity = document.getElementById('cidadeCompra').value;
  box.innerHTML = '<label class="checkbox-row"><input type="checkbox" id="sellAll" checked /> <strong id="lblSelectAll">' + t('selectAll') + '</strong></label><div class="divider"></div>';
  CITIES.concat(SELL_ONLY_LOCATIONS).forEach(function (city) {
    if (city === buyCity) return;
    const id = 'sell_' + city.replace(/\s+/g, '');
    const row = document.createElement('label');
    row.className = 'checkbox-row';
    row.innerHTML = '<input type="checkbox" id="' + id + '" data-city="' + city + '" checked /> ' + city;
    box.appendChild(row);
  });
  document.getElementById('sellAll').addEventListener('change', function () {
    const checked = this.checked;
    box.querySelectorAll('input[data-city]').forEach(function (cb) { cb.checked = checked; });
  });
  box.querySelectorAll('input[data-city]').forEach(function (cb) {
    cb.addEventListener('change', function () {
      const all = Array.from(box.querySelectorAll('input[data-city]')).every(function (c) { return c.checked; });
      document.getElementById('sellAll').checked = all;
    });
  });
}

document.getElementById('cidadeCompra').addEventListener('change', buildSellCityCheckboxes);

function getSelectedSellCities() {

function buildCategoryCheckboxes(counts) {
  const box = document.getElementById('categoryBox');
  const previouslyChecked = Array.from(box.querySelectorAll('input[data-cat]:checked')).map(function (cb) { return cb.dataset.cat; });
  const firstRun = previouslyChecked.length === 0 && !box.querySelector('input[data-cat]');

  box.innerHTML = '<label class="checkbox-row"><input type="checkbox" id="catAll" checked /> <strong id="lblSelectAllCat">' + t('selectAll') + '</strong></label><div class="divider"></div>';
  CATEGORY_ORDER.forEach(function (cat) {
    if (!counts[cat]) return;
    const row = document.createElement('label');
    row.className = 'checkbox-row';
    const checked = firstRun || previouslyChecked.includes(cat);
    row.innerHTML = '<input type="checkbox" id="cat_' + cat + '" data-cat="' + cat + '" ' + (checked ? 'checked' : '') + ' /> ' + CAT_LABELS[lang][cat] + ' (' + counts[cat] + ')';
    box.appendChild(row);
  });

  const allBoxes = box.querySelectorAll('input[data-cat]');
  document.getElementById('catAll').checked = Array.from(allBoxes).every(function (c) { return c.checked; });
  document.getElementById('catAll').addEventListener('change', function () {
    const checked = this.checked;
    box.querySelectorAll('input[data-cat]').forEach(function (cb) { cb.checked = checked; });
  });
  allBoxes.forEach(function (cb) {
    cb.addEventListener('change', function () {
      const all = Array.from(box.querySelectorAll('input[data-cat]')).every(function (c) { return c.checked; });
      document.getElementById('catAll').checked = all;
    });
  });
}

const TABS = [
  { tab: 'tabExplorer', view: 'viewExplorer', display: 'grid' },
  { tab: 'tabSearch', view: 'viewSearch', display: 'block' },
  { tab: 'tabCraft', view: 'viewCraft', display: 'block' },

];

function switchTab(activeTab) {
  TABS.forEach(function (entry) {
    const isActive = entry.tab === activeTab;
    document.getElementById(entry.tab).classList.toggle('active', isActive);
    document.getElementById(entry.view).style.display = isActive ? entry.display : 'none';
  });
}

async function pollNatsStatus() {
  const el = document.getElementById('natsIndicator');
  try {
    const res = await fetch('/api/nats-status');
    const data = await res.json();
    const r = data.regions && data.regions[region];
    if (!r) { el.textContent = ''; return; }
    el.textContent = '(' + (r.connected ? t('natsConnected', { n: r.orderCount.toLocaleString() }) : t('natsDisconnected')) + ')';
  } catch (e) {
    el.textContent = '';
  }
}

async function connectToBackend() {
  const statusEl = document.getElementById('status');
  for (let attempt = 0; attempt < 30; attempt++) {
    try {
      const res = await fetch('/api/categories');
      if (res.status === 503) {
        statusEl.textContent = t('catalogLoading');
        await new Promise(function (r) { setTimeout(r, 3000); });
        continue;
      }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      lastCategoryCounts = data.counts;
      buildCategoryCheckboxes(data.counts);
      statusEl.textContent = t('ready', { n: data.counts.all });
      return;
    } catch (e) {
      statusEl.textContent = t('backendError');
      await new Promise(function (r) { setTimeout(r, 3000); });
    }
  }
}

function tabelaHtml(headers, rows) {
  let html = '<div class="table-wrap"><table><tr>';
  headers.forEach(function (h) { html += '<th class="' + (h.num ? 'num' : '') + '">' + h.label + '</th>'; });
  html += '</tr>';
  rows.forEach(function (r) { html += '<tr>' + r + '</tr>'; });
  html += '</table></div>';
  return html;
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleString(lang === 'pt' ? 'pt-BR' : 'en-US', {
    day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit',
    hour12: false, timeZone: 'America/Sao_Paulo'
  }) + ' (UTC-3)';
}

function renderTable(opps) {
  const resultsEl = document.getElementById('results');
  const rows = opps.map(function (o) {
    const nameBase = lang === 'pt' ? o.pt : o.en;
    const qualLabel = QUALITY_LABELS[lang][o.quality];
    const label = o.quality > 1 ? nameBase + ' (' + qualLabel + ')' : nameBase;
    const buyDate = formatDate(o.buyCostDate);
    const sellDate = formatDate(o.sellPriceDate);
    const volCell = o.volume24h
      ? o.volume24h.qty.toLocaleString() + ' <span style="color:var(--text-secondary); font-size:12px;">(' + o.volume24h.avgPrice.toLocaleString() + ')</span>'
      : '<span style="color:var(--text-secondary);">' + t('noVolume') + '</span>';
    return '<td class="icon-cell"><img src="' + itemIconUrl(o.id, o.quality) + '" loading="lazy" onerror="this.style.display=\'none\'" alt="" /></td>' +
      '<td>' + label + '</td>' +
      '<td class="num">' + o.buyCost.toLocaleString() + (buyDate ? '<br><span style="color:var(--text-secondary); font-size:11px;">' + buyDate + '</span>' : '') + '</td>' +
      '<td>' + o.destCity + '</td>' +
      '<td class="num">' + o.sellPrice.toLocaleString() + (sellDate ? '<br><span style="color:var(--text-secondary); font-size:11px;">' + sellDate + '</span>' : '') + '</td>' +
      '<td class="num profit">+' + o.profit.toLocaleString() + '</td>' +
      '<td class="num profit">' + o.pct.toFixed(1) + '%</td>' +
      '<td class="num">' + volCell + '</td>';
  });
  resultsEl.innerHTML = tabelaHtml([
    { label: '' }, { label: t('colItem') }, { label: t('colBuy'), num: true }, { label: t('colSellAt') },
    { label: t('colSell'), num: true }, { label: t('colProfit'), num: true }, { label: t('colProfitPct'), num: true },
    { label: t('colVolume'), num: true }
  ], rows);
}

document.getElementById('goBtn').addEventListener('click', async function () {
  const includeEnchanted = document.getElementById('encantados').checked;
  const includeQualities = document.getElementById('qualidades').checked;
  const cidadeCompra = document.getElementById('cidadeCompra').value;
  const sellCities = getSelectedSellCities();
  const categories = getSelectedCategories();
  const sortMode = document.getElementById('ordenarPor').value;
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');
  const btn = document.getElementById('goBtn');

  if (sellCities.length === 0) { statusEl.textContent = t('chooseCities'); return; }
  if (categories.length === 0) { statusEl.textContent = t('chooseCats'); return; }

  btn.disabled = true;
  resultsEl.innerHTML = '';
  lastOpportunities = [];
  statusEl.textContent = t('searching');

  const sellAllChecked = document.getElementById('sellAll').checked;
  const catAllChecked = document.getElementById('catAll').checked;
  const params = new URLSearchParams({
    categories: catAllChecked ? 'ALL' : categories.join(','),
    enchanted: includeEnchanted, qualities: includeQualities,
    buyCity: cidadeCompra, sellCities: sellAllChecked ? 'ALL' : sellCities.join(','),
    region: region, liveNats: document.getElementById('usarNats').checked
  });
  const endpoint = '/api/opportunities';

  try {
    const res = await fetch(endpoint + '?' + params.toString());
    const data = await res.json();

    if (data.status === 'no_items') {
      statusEl.textContent = t('noneForFilters');
    } else if (data.status === 'no_opportunities') {
      statusEl.textContent = t('noOpp', { n: data.dataCount || 0 });
    } else if (data.status === 'ok') {
      let opps = data.opportunities;
      opps.sort(function (a, b) { return sortMode === 'pct' ? b.pct - a.pct : b.profit - a.profit; });
      opps = opps.slice(0, 80);
      lastOpportunities = opps;
      statusEl.textContent = t('found', { n: opps.length, city: cidadeCompra });
      renderTable(opps);
    } else {
      statusEl.textContent = 'Error: ' + data.status;
    }
  } catch (e) {
    statusEl.textContent = t('backendError');
  }
  btn.disabled = false;
});

const searchInput = document.getElementById('searchInput');
const searchDropdown = document.getElementById('searchDropdown');

searchInput.addEventListener('input', function () {
  clearTimeout(searchDebounce);
  const q = this.value.trim();
  if (q.length < 2) { searchDropdown.style.display = 'none'; return; }
  searchDebounce = setTimeout(async function () {
    try {
      const res = await fetch('/api/search-items?q=' + encodeURIComponent(q));
      const data = await res.json();
      renderSearchDropdown(data.results || []);
    } catch (e) { /* ignore */ }
  }, 300);

function renderSearchDropdown(results) {
  if (results.length === 0) {
    searchDropdown.innerHTML = '<div class="search-result-item">' + t('searchNoResults') + '</div>';
    searchDropdown.style.display = 'block';
    return;
  }
  searchDropdown.innerHTML = results.map(function (it) {
    const name = lang === 'pt' ? it.pt : it.en;
    return '<div class="search-result-item" data-id="' + it.id + '">' +
      '<img src="' + itemIconUrl(it.id, 1) + '" onerror="this.style.display=\'none\'" alt="" />' +
      '<span>T' + it.tier + (it.ench ? '.' + it.ench : '') + ' ' + name + '</span></div>';
  }).join('');
  searchDropdown.style.display = 'block';
  searchDropdown.querySelectorAll('.search-result-item[data-id]').forEach(function (row) {
    row.addEventListener('click', function () { selectItem(this.dataset.id, results); });
  });
}

async function selectItem(id, results) {
  selectedItem = results.find(function (r) { return r.id === id; }) || null;
  searchDropdown.style.display = 'none';
  searchInput.value = '';
  await renderItemSearchResult();
}

function itemHeaderHtml() {

    '<h2>T' + selectedItem.tier + (selectedItem.ench ? '.' + selectedItem.ench : '') + ' ' + name + '</h2></div>';

async function renderItemSearchResult() {
  if (!selectedItem) return;
  const area = document.getElementById('searchResultArea');
  const includeQualities = document.getElementById('searchQualities').checked;

  area.innerHTML = itemHeaderHtml() + '<p class="status">' + t('searching') + '</p>';

  const params = new URLSearchParams({ id: selectedItem.id, region: region, qualities: includeQualities });
  try {
    const res = await fetch('/api/item-prices?' + params.toString());
    const data = await res.json();
    let priceHtml;
    if (data.status !== 'ok' || !data.prices.length) {
      priceHtml = '<p class="status">' + t('priceNoData') + '</p>';
    } else {
      const rows = data.prices
        .filter(function (p) { return p.sell_price_min > 0 || p.buy_price_max > 0; })
        .sort(function (a, b) { return a.city.localeCompare(b.city) || a.quality - b.quality; })
        .map(function (p) {
          const qualLabel = QUALITY_LABELS[lang][p.quality] || p.quality;
          const isBlackMarket = p.city === 'Black Market';
          const buyDate = formatDate(p.sell_price_min_date);
          const sellDate = formatDate(p.buy_price_max_date);
          const buyCell = isBlackMarket ? '—' : (p.sell_price_min ? p.sell_price_min.toLocaleString() : '—') + (buyDate ? '<br><span style="color:var(--text-secondary); font-size:11px;">' + buyDate + '</span>' : '');
          return '<td>' + p.city + (isBlackMarket ? ' <span style="color:var(--text-secondary); font-size:11px;">(' + t('buyOnly') + ')</span>' : '') + '</td>' +
            '<td>' + qualLabel + '</td>' +
            '<td class="num">' + buyCell + '</td>' +
            '<td class="num">' + (p.buy_price_max ? p.buy_price_max.toLocaleString() : '—') + (sellDate ? '<br><span style="color:var(--text-secondary); font-size:11px;">' + sellDate + '</span>' : '') + '</td>';
        });
      priceHtml = tabelaHtml([
        { label: t('priceColCity') }, { label: t('priceColQuality') },
        { label: t('priceColBuy'), num: true }, { label: t('priceColSell'), num: true }
      ], rows);
    }

    const periodButtons = '<div class="period-buttons">' + PERIODS.map(function (d) {
      return '<button class="period-btn' + (d === historyPeriod ? ' active' : '') + '" data-days="' + d + '">' + t('day' + d) + '</button>';
    }).join('') + '</div>';

    area.innerHTML = itemHeaderHtml() + priceHtml +
      '<div class="section-title">' + t('historyTitle') + '</div>' +
      periodButtons + '<div id="historyArea"><p class="status">' + t('historyLoading') + '</p></div>';

    area.querySelectorAll('.period-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        historyPeriod = parseInt(this.dataset.days, 10);
        area.querySelectorAll('.period-btn').forEach(function (b) { b.classList.remove('active'); });
        this.classList.add('active');
        loadHistory();
      });
    });
    loadHistory();
  } catch (e) {
    area.innerHTML = itemHeaderHtml() + '<p class="status">' + t('backendError') + '</p>';
  }
}

async function loadHistory() {
  const historyArea = document.getElementById('historyArea');
  if (!historyArea || !selectedItem) return;
  historyArea.innerHTML = '<p class="status">' + t('historyLoading') + '</p>';

  const params = new URLSearchParams({ id: selectedItem.id, region: region, days: historyPeriod });
  try {
    const res = await fetch('/api/item-history?' + params.toString());
    const data = await res.json();
    if (data.status !== 'ok' || !data.history.length) {
      historyArea.innerHTML = '<p class="status">' + t('historyNoData') + '</p>';
      return;
    }
    const byCity = {};
    data.history.forEach(function (entry) {
      if (!entry.data || !entry.data.length) return;
      let totalCount = 0;
      let weightedPriceSum = 0;
      entry.data.forEach(function (d) {
        totalCount += d.item_count;
        weightedPriceSum += d.avg_price * d.item_count;
      });
      if (totalCount === 0) return;
      byCity[entry.location] = { count: totalCount, avgPrice: Math.round(weightedPriceSum / totalCount) };
    });
    const cities = Object.keys(byCity);
    if (cities.length === 0) {
      historyArea.innerHTML = '<p class="status">' + t('historyNoData') + '</p>';
      return;
    }
    const rows = cities.sort().map(function (city) {
      const c = byCity[city];
      return '<td>' + city + '</td><td class="num">' + c.count.toLocaleString() + '</td><td class="num">' + c.avgPrice.toLocaleString() + '</td>';
    });
    historyArea.innerHTML = tabelaHtml([
      { label: t('historyColCity') }, { label: t('historyColSold'), num: true }, { label: t('historyColAvg'), num: true }
    ], rows);
  } catch (e) {
    historyArea.innerHTML = '<p class="status">' + t('backendError') + '</p>';
  }
}

document.addEventListener('click', function (e) {
  if (!searchDropdown.contains(e.target) && e.target !== searchInput) searchDropdown.style.display = 'none';
});

(async function init() {
  applyLanguage();
  await connectToBackend();
  pollNatsStatus();
  setInterval(pollNatsStatus, 10000);
})();
</script>
